spring.application.name=FinanceMate
spring.datasource.url=jdbc:postgresql://localhost:5432/financedb
spring.datasource.username=user
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.generate_statistics=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
server.port=8080

app.jwt.secret=6C5970337336763979244226452948404D635166546A576E5A723475377821412
app.jwt.access-token-minutes=900000
app.jwt.refresh-token-days=604800000

exchange.api.key=${EXCHANGE_RATE_API_KEY}
twelve.data.api.key=${TWELVE_DATA_API_KEY}
twelve.data.api.base-url=https://api.twelvedata.com/time_series

logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

spring.cache.type=caffeine
spring.cache.cache-names=exchangeRates
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=24h